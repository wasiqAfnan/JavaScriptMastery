<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        flex-direction: column;
      }
      main {
        /* border: 2px solid red; */
        background-color: antiquewhite;
      }
      h1{
        /* border: 2px solid black; */
        text-align: center;
      }
      button{
        padding: 10px;
        font-size: 20px;
        color: black;
        background-color: beige;
        outline: none;
        border: 0.5px solid rgb(182, 182, 240);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="counter">0</h1>
      <button onclick="increase()">+</button>
      <button onclick="decrease()">-</button>
      <button onclick="reset()">Reset</button>
    </main>
  </body>
  <script>
    let counter = document.getElementById("counter");
    let count = 0;
    function increase() {
      count++;
      counter.textContent = count;
    }

    function decrease() {
      if (count >= 1) {
        count--;
      }
      counter.textContent = count;
    }

    function reset() {
      count = 0;
      counter.textContent = count;
    }
  </script>
</html>
