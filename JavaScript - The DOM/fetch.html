<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Table Example</title>
    <style>
        /* Simple CSS for layout and table styling */
        body {
            font-family: sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        h2 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>User Directory</h2>
    <button id="fetchBtn">Fetch User Data</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            </tbody>
    </table>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const tableBody = document.getElementById('userTableBody');

        // Main Fetch Logic
        fetchBtn.addEventListener('click', () => {
            // 1. Start the fetch request
            fetch('https://jsonplaceholder.typicode.com/users')
                .then(response => {
                    // 2. Check if the response is successful
                    if (!response.ok) {
                        throw new Error("Network response was not ok");
                    }
                    return response.json(); // Convert response to JSON
                })
                .then(data => {
                    // 3. Call function to render data
                    renderData(data);
                })
                .catch(error => {
                    console.error("There was an error:", error);
                    alert("Failed to fetch data.");
                });
        });

        // Function to create table rows
        function renderData(users) {
            tableBody.innerHTML = ""; // Clear table first

            users.forEach(user => {
                const row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.address.city}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
