<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Registration System</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      nav {
        background-color: #007bff;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
      }

      main {
        max-width: 850px;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        flex: 1;
      }

      h2 {
        text-align: center;
        margin-bottom: 15px;
        color: #333;
      }

      form {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 15px;
      }

      input,
      select {
        flex: 1;
        padding: 8px;
        font-size: 14px;
      }

      button {
        padding: 8px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      .add-btn {
        background-color: #28a745;
        color: white;
      }

      .update-btn {
        background-color: #ffc107;
        color: black;
      }

      .delete-btn {
        background-color: #dc3545;
        color: white;
      }

      .search-box {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
      }

      th {
        background-color: #007bff;
        color: white;
      }

      .no-data {
        color: gray;
        padding: 15px;
      }

      footer {
        margin-top: 30px;
        background-color: #222;
        color: #bbb;
        text-align: center;
        padding: 10px;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <!-- Navigation / Header -->
    <nav>Student Registration System</nav>

    <!-- Main Content -->
    <main>
      <h2>Manage Students</h2>

      <form id="studentForm">
        <input type="text" id="name" placeholder="Enter Name" />

        <input type="email" id="email" placeholder="Enter Email" />

        <select id="course">
          <option value="">Select Course</option>
          <option>Java</option>
          <option>Python</option>
          <option>Web Development</option>
        </select>

        <button type="submit" id="submitBtn" class="add-btn">
          Add Student
        </button>
      </form>

      <input
        type="text"
        id="search"
        class="search-box"
        placeholder="Search by name..."
      />

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="studentTableBody"></tbody>
      </table>
    </main>

    <!-- Footer -->
    <footer>© 2026 Student Management System | Developed by Wasiq</footer>

    <script>
      let students = JSON.parse(localStorage.getItem("students")) || [];

      let editIndex = -1;

      const form = document.getElementById("studentForm");
      const nameInput = document.getElementById("name");
      const emailInput = document.getElementById("email");
      const courseInput = document.getElementById("course");

      const tableBody = document.getElementById("studentTableBody");
      const submitBtn = document.getElementById("submitBtn");
      const searchInput = document.getElementById("search");

      function renderStudents(list = students) {
        tableBody.innerHTML = "";

        if (list.length === 0) {
          tableBody.innerHTML =
            "<tr><td colspan='5' class='no-data'>No Students Found</td></tr>";

          return;
        }

        list.forEach((student, index) => {
          let row = `

                <tr>

                    <td>${index + 1}</td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.course}</td>

                    <td>

                        <button class="update-btn"
                            onclick="editStudent(${index})">
                            Edit
                        </button>

                        <button class="delete-btn"
                            onclick="deleteStudent(${index})">
                            Delete
                        </button>

                    </td>

                </tr>

            `;

          tableBody.innerHTML += row;
        });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        let name = nameInput.value.trim();
        let email = emailInput.value.trim();
        let course = courseInput.value;

        if (name === "" || email === "" || course === "") {
          alert("All fields are required!");

          return;
        }

        if (!email.includes("@")) {
          alert("Invalid email address!");

          return;
        }

        let student = { name, email, course };

        if (editIndex === -1) {
          students.push(student);
        } else {
          students[editIndex] = student;

          editIndex = -1;

          submitBtn.textContent = "Add Student";
          submitBtn.className = "add-btn";
        }

        localStorage.setItem("students", JSON.stringify(students));

        form.reset();

        renderStudents();
      });

      function editStudent(index) {
        let s = students[index];

        nameInput.value = s.name;
        emailInput.value = s.email;
        courseInput.value = s.course;

        editIndex = index;

        submitBtn.textContent = "Update Student";
        submitBtn.className = "update-btn";
      }

      function deleteStudent(index) {
        if (confirm("Delete this student record?")) {
          students.splice(index, 1);

          localStorage.setItem("students", JSON.stringify(students));

          renderStudents();
        }
      }

      searchInput.addEventListener("keyup", function () {
        let value = searchInput.value.toLowerCase();

        let filtered = students.filter((s) =>
          s.name.toLowerCase().includes(value),
        );

        renderStudents(filtered);
      });

      renderStudents();
    </script>
  </body>
</html>
